<!doctype html>
<html lang="en">
<head>
<script>
  // Suppress benign Chromium ResizeObserver loop warning.
  (function(){
    function isRO(m){ return typeof m === 'string' && /ResizeObserver loop/.test(m); }
    window.onerror = function(msg){ if(isRO(String(msg))) return true; };
    window.addEventListener('error', function(e){
      if(e && (isRO(e.message) || (e.error && isRO(e.error.message)))){
        e.stopImmediatePropagation();
        e.preventDefault();
        return false;
      }
    }, true);
    ['error','warn'].forEach(function(k){
      var orig = console[k];
      console[k] = function(){
        if(arguments[0] && isRO(String(arguments[0]))) return;
        return orig.apply(console, arguments);
      };
    });
  })();
</script>
<meta charset="utf-8">
<title>Zenna — Japanese matcha and Finnish strawberries</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script>
  // Dev-preview asset auth: the iframe carries ?t=… on the HTML URL,
  // but the dev server rejects relative asset requests without it.
  // Build a tokenised-URL helper and use it for stylesheet + scripts.
  (function(){
    var m = location.search.match(/[?&]t=([^&]+)/);
    var t = m ? m[1] : '';
    window.__zennaUrl = function(p){
      if(!t) return p;
      if(/^(https?:|data:|blob:)/.test(p) || /[?&]t=/.test(p)) return p;
      return p + (p.indexOf('?')>-1?'&':'?') + 't=' + t + '&direct=1';
    };
    // stylesheet
    var l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = window.__zennaUrl('styles.css');
    document.head.appendChild(l);

    // Preload the wordmark as a blob and swap it in once loaded.
    // Some screenshot tools don't render dynamically-set <img src>; a blob
    // URL set after DOMContentLoaded is reliable.
    fetch(window.__zennaUrl('assets/zenna-wordmark.png'))
      .then(function(r){ return r.blob(); })
      .then(function(b){
        var url = URL.createObjectURL(b);
        window.__zennaWordmarkUrl = url;
        function swap(){
          document.querySelectorAll('img[data-src="assets/zenna-wordmark.png"], .wordmark img').forEach(function(el){
            el.src = url;
          });
        }
        if(document.readyState === 'loading'){
          document.addEventListener('DOMContentLoaded', swap);
        } else {
          swap();
        }
      }).catch(function(){});
  })();
</script>
</head>
<body>

    </button>

  <div class="body" id="cart-body"></div>
  <div class="foot" id="cart-foot" style="display:none"></div>

<script>
  // Patch any data-src/data-href attributes to tokenised src/href, then load app code.
  (function(){
    var url = window.__zennaUrl || function(p){return p};
    document.querySelectorAll('[data-src]').forEach(function(el){ el.src = url(el.getAttribute('data-src')); });
    document.querySelectorAll('[data-href]').forEach(function(el){ el.href = url(el.getAttribute('data-href')); });
    ['i18n.js','pages.js','app.js'].reduce(function(p, src){
      return p.then(function(){
        return new Promise(function(res, rej){
          var s = document.createElement('script');
          s.src = url(src); s.onload = res; s.onerror = rej;
          document.body.appendChild(s);
        });
      });
    }, Promise.resolve());
  })();
</script>
</body>
</html>
