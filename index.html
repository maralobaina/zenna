<html lang="en">
  <head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zenna — Japanese matcha and Finnish strawberries</title>
    <meta
      name="description"
      content="Ceremonial-grade matcha from Uji, Japan, blended with Finnish polka strawberries. No added sugar."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ───── PROMO STRIP ───── -->
    <div class="promo" role="region" aria-label="Promotions">
      <span class="promo-msg" data-i18n="promo.shipping"></span>
      <span class="promo-msg" data-i18n="promo.madein"></span>
      <span class="promo-msg" data-i18n="promo.matcha"></span>
    </div>

    <!-- ───── PRIMARY NAV ───── -->
    <nav class="nav" aria-label="Primary">
      <div class="left">
        <a
          class="navpill"
          data-navkey="products"
          href="#/products"
          data-i18n="nav.products"
        ></a>
        <a
          class="navpill"
          data-navkey="about"
          href="#/about"
          data-i18n="nav.about"
        ></a>
      </div>
      <a class="wordmark" href="#/" aria-label="Zenna — home">
        <img src="assets/zenna-wordmark.webp" alt="Zenna" />
      </a>
      <div class="right">
        <button class="icon-btn" aria-label="Account">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 21c0-4 4-7 8-7s8 3 8 7" />
          </svg>
        </button>
        <button class="icon-btn" id="cart-toggle" aria-label="Bag">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M5 8h14l-1.4 11.2a2 2 0 0 1-2 1.8H8.4a2 2 0 0 1-2-1.8L5 8z"
            />
            <path d="M9 8V6a3 3 0 0 1 6 0v2" />
          </svg>
          <!-- toggled by JS based on cart count -->
          <span class="badge" id="cart-badge" style="display: none">0</span>
        </button>
        <div class="lang" role="group" aria-label="Language">
          <button data-lang="en" class="on">EN</button>
          <button data-lang="fi">FI</button>
        </div>
      </div>
    </nav>

    <!-- ───── PAGE MOUNT — content rendered by router in app.js ───── -->
    <div id="page-loader" aria-hidden="true"></div>
    <main id="page" class="page"></main>

    <!-- ───── SCROLL TO TOP ───── -->
    <button id="scroll-top" aria-label="Back to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <!-- ───── FOOTER BAR ───── -->
    <footer class="footbar">
      <div class="left" data-i18n="foot.copy"></div>
      <div class="mid"><a href="#" data-i18n="foot.terms"></a></div>
      <div class="right">
        <a href="#" aria-label="Instagram">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="18" height="18" rx="5" />
            <circle cx="12" cy="12" r="4" />
            <circle cx="17.5" cy="6.5" r=".6" fill="currentColor" />
          </svg>
        </a>
        <a href="#" aria-label="TikTok">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M16 3v2.6a4.4 4.4 0 0 0 4.4 4.4V13a7.4 7.4 0 0 1-4.4-1.5V16a5 5 0 1 1-5-5h.6v3a2 2 0 1 0 1.4 1.9V3H16z"
            />
          </svg>
        </a>
      </div>
    </footer>

    <!-- ───── CART DRAWER ───── -->
    <div class="scrim" id="scrim"></div>
    <aside class="cart-drawer" id="cart-drawer" aria-hidden="true">
      <div class="head">
        <div>
          <h3 data-i18n="cart.title">Your bag</h3>
          <span class="count" id="cart-head-count">0</span>
        </div>
        <button class="close" aria-label="Close">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>
      <div class="body" id="cart-body"></div>
      <!-- toggled by JS based on cart state -->
      <div class="foot" id="cart-foot" style="display: none"></div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-client.js"></script>
    <script src="i18n.js"></script>
    <script src="pages.js"></script>
    <script src="app.js"></script>
  </body>
</html>
